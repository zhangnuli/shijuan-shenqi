# 打 tag（如 v0.1.1）后自动构建 Windows 安装包并发布到 GitHub Releases
# 同时上传 updater 用的 latest.json，供应用内「检查更新」使用
#
# 仓库 Secrets（Settings → Secrets and variables → Actions）：
#   TAURI_SIGNING_PRIVATE_KEY          必填 — .tauri/shijuan.key 全文
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD 可选 — 生成密钥时若设了密码则填写

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: '仅构建不发布（调试用）'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-windows:
    runs-on: windows-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: web/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Sync version from tag
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            export VERSION="${GITHUB_REF_NAME#v}"
          else
            # workflow_dispatch：沿用仓库内已有版本
            export VERSION="$(node -p "require('./web/src-tauri/tauri.conf.json').version")"
          fi
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].*)?$ ]]; then
            echo "Invalid version: $VERSION"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Release version: $VERSION"

          node <<'NODE'
          const fs = require('fs');
          const version = process.env.VERSION;
          if (!version) {
            console.error('VERSION env is empty');
            process.exit(1);
          }
          // tauri.conf.json
          const confPath = 'web/src-tauri/tauri.conf.json';
          const conf = JSON.parse(fs.readFileSync(confPath, 'utf8'));
          conf.version = version;
          fs.writeFileSync(confPath, JSON.stringify(conf, null, 2) + '\n');
          // Cargo.toml — 只改 [package] 下第一处 version
          const cargoPath = 'web/src-tauri/Cargo.toml';
          let cargo = fs.readFileSync(cargoPath, 'utf8');
          let seen = false;
          cargo = cargo.replace(/^version\s*=\s*"[^"]*"/m, (m) => {
            if (seen) return m;
            seen = true;
            return `version = "${version}"`;
          });
          fs.writeFileSync(cargoPath, cargo);
          // package.json
          for (const p of ['package.json', 'web/package.json']) {
            if (!fs.existsSync(p)) continue;
            const pkg = JSON.parse(fs.readFileSync(p, 'utf8'));
            pkg.version = version;
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
          }
          console.log('Synced version to', version);
          NODE

      - name: Build and publish (Tauri)
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: web
          tagName: v__VERSION__
          releaseName: 试卷神器 v__VERSION__
          releaseBody: |
            ## 试卷神器 v__VERSION__

            ### 安装
            - 下载 Assets 中的 **`*-setup.exe`**（推荐）或 **`.msi`** 安装。

            ### 自动更新
            - 本 Release 含 **`latest.json`** 与 **`*.nsis.zip`**（+ `.sig`）。
            - 已安装旧版用户可在应用内点 **检查更新**（需联网访问 GitHub Releases）。

            ### 说明
            - 本地优先桌面工具；API Key 仅保存在本机，不会上传。
            - 课标数据仅为公开目录大纲，不含教材正文。
          releaseDraft: false
          prerelease: false
          # 官方参数名是 uploadUpdaterJson（旧名 includeUpdaterJson 会被忽略 → 不上传 latest.json）
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true
          # 避免中文 productName 在 GitHub Asset 被剥空变成 _0.1.0_x64-setup.exe
          releaseAssetNamePattern: shijuan-shenqi_[version]_[platform]_[arch][ext]

      - name: Ensure latest.json on Release
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ env.VERSION }}
        run: |
          set -euo pipefail
          TAG="v${VERSION}"
          # 若 tauri-action 已上传则跳过
          if curl -fsI "https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/latest.json" >/dev/null 2>&1; then
            echo "latest.json already present"
            exit 0
          fi
          echo "latest.json missing — generating fallback from release assets"
          # 优先 NSIS setup.exe
          ASSET_API="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}"
          META=$(curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "$ASSET_API")
          # 找 setup.exe 与对应 .sig
          export SETUP_URL
          SETUP_URL=$(echo "$META" | node -e "
            let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{
              const j=JSON.parse(d);
              const a=(j.assets||[]).find(x=>/setup\\.exe$/i.test(x.name) && !/\\.sig$/i.test(x.name));
              if(!a){ console.error('no setup.exe asset'); process.exit(1); }
              console.log(a.browser_download_url);
            });
          ")
          export SIG
          SIG=$(curl -fsSL "${SETUP_URL}.sig" | tr -d '\r')
          if [[ -z "$SIG" || -z "$SETUP_URL" ]]; then
            echo "missing SETUP_URL or SIG"
            exit 1
          fi
          node -e "
            const fs=require('fs');
            const payload={
              version: process.env.VERSION,
              notes: 'v'+process.env.VERSION,
              pub_date: new Date().toISOString(),
              platforms: {
                'windows-x86_64': {
                  signature: process.env.SIG,
                  url: process.env.SETUP_URL
                }
              }
            };
            fs.writeFileSync('latest.json', JSON.stringify(payload,null,2));
            console.log(JSON.stringify(payload,null,2));
          "
          # 上传到该 Release
          REL_ID=$(echo "$META" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).id))")
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @latest.json \
            "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/${REL_ID}/assets?name=latest.json"
          echo "Uploaded fallback latest.json"

      - name: Build only (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        working-directory: web
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri:build

      - name: Upload build artifacts (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        uses: actions/upload-artifact@v4
        with:
          name: windows-bundle-${{ env.VERSION }}
          path: |
            web/src-tauri/target/release/bundle/nsis/*
            web/src-tauri/target/release/bundle/msi/*
          if-no-files-found: warn
